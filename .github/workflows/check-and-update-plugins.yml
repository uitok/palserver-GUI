name: Check and Update Plugins

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: check-plugin-updates
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check UE4SS latest version
        id: ue4ss
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/UE4SS-RE/RE-UE4SS/releases/latest)
          LATEST=$(echo "$RESPONSE" | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to resolve UE4SS latest version" >&2
            exit 1
          fi
          LATEST_CLEAN=$(echo "$LATEST" | sed 's/^v//')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_clean=$LATEST_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Check PalGuard latest version
        id: palguard
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/Ultimeit/PalDefender/releases/latest)
          LATEST=$(echo "$RESPONSE" | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "Failed to resolve PalGuard latest version" >&2
            exit 1
          fi
          LATEST_CLEAN=$(echo "$LATEST" | sed 's/^v//')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_clean=$LATEST_CLEAN" >> "$GITHUB_OUTPUT"

      - name: Read current versions from config
        id: current
        run: |
          if [ -f "plugin-versions.json" ]; then
            UE4SS_CURRENT=$(jq -r '.ue4ss.version' plugin-versions.json)
            PALGUARD_CURRENT=$(jq -r '.palguard.version' plugin-versions.json)
          else
            UE4SS_CURRENT=""
            PALGUARD_CURRENT=""
          fi
          echo "ue4ss_current=${UE4SS_CURRENT:-}" >> "$GITHUB_OUTPUT"
          echo "palguard_current=${PALGUARD_CURRENT:-}" >> "$GITHUB_OUTPUT"

      - name: Check if updates needed
        id: check
        run: |
          UE4SS_LATEST="${{ steps.ue4ss.outputs.latest_clean }}"
          UE4SS_CURRENT="${{ steps.current.outputs.ue4ss_current }}"
          PALGUARD_LATEST="${{ steps.palguard.outputs.latest_clean }}"
          PALGUARD_CURRENT="${{ steps.current.outputs.palguard_current }}"

          if [ "$UE4SS_LATEST" != "$UE4SS_CURRENT" ] || [ "$PALGUARD_LATEST" != "$PALGUARD_CURRENT" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Update plugin-versions.json
        if: steps.check.outputs.needs_update == 'true'
        run: |
          UE4SS_LATEST="${{ steps.ue4ss.outputs.latest_clean }}"
          PALGUARD_LATEST="${{ steps.palguard.outputs.latest_clean }}"

          jq --arg ue4ss "$UE4SS_LATEST" --arg palguard "$PALGUARD_LATEST" '.ue4ss.version = $ue4ss | .palguard.version = $palguard | .palguard.repo = "Ultimeit/PalDefender"' plugin-versions.json > tmp.json
          mv tmp.json plugin-versions.json

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update plugin versions

            - UE4SS: ${{ steps.current.outputs.ue4ss_current }} -> ${{ steps.ue4ss.outputs.latest_clean }}
            - PalGuard: ${{ steps.current.outputs.palguard_current }} -> ${{ steps.palguard.outputs.latest_clean }}
          branch: auto-update-plugins
          delete-branch: true
          title: 'chore: update plugin versions'
          body: |
            ## Automated plugin version update

            | Plugin | Current | Latest |
            |---|---|---|
            | UE4SS | ${{ steps.current.outputs.ue4ss_current }} | ${{ steps.ue4ss.outputs.latest_clean }} |
            | PalGuard | ${{ steps.current.outputs.palguard_current }} | ${{ steps.palguard.outputs.latest_clean }} |

            - UE4SS release: https://github.com/UE4SS-RE/RE-UE4SS/releases/tag/${{ steps.ue4ss.outputs.latest }}
            - PalGuard release: https://github.com/Ultimeit/PalDefender/releases/tag/${{ steps.palguard.outputs.latest }}
          labels: |
            plugin-update
            automated
            dependencies
          assignees: ${{ github.repository_owner }}
