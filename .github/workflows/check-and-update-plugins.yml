name: Check and Update Plugins

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 检查一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: check-plugin-updates
  cancel-in-progress: true

jobs:
  check-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check UE4SS latest version
        id: ue4ss
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          RESPONSE=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            https://api.github.com/repos/UE4SS-RE/RE-UE4SS/releases/latest)
          LATEST=$(echo "$RESPONSE" | jq -r '.tag_name')
          if [ -z "$LATEST" ] || [ "$LATEST" = "null" ]; then
            echo "无法解析 UE4SS 最新版本" >&2
            exit 1
          fi
          # 去掉 v 前缀用于版本比较
          LATEST_CLEAN=$(echo "$LATEST" | sed 's/^v//')
          echo "latest=$LATEST" >> "$GITHUB_OUTPUT"
          echo "latest_clean=$LATEST_CLEAN" >> "$GITHUB_OUTPUT"
          echo "UE4SS 最新版本: $LATEST"

      - name: Check PalGuard latest version
        id: palguard
        continue-on-error: true
        run: |
          # PalGuard 仓库地址待确认
          echo "latest=未知" >> "$GITHUB_OUTPUT"
          echo "latest_clean=未知" >> "$GITHUB_OUTPUT"
          echo "PalGuard 仓库地址待确认"

      - name: Read current versions from config
        id: current
        run: |
          if [ -f "plugin-versions.json" ]; then
            UE4SS_CURRENT=$(jq -r '.ue4ss.version' plugin-versions.json)
            PALGUARD_CURRENT=$(jq -r '.palguard.version' plugin-versions.json)
          else
            UE4SS_CURRENT=""
            PALGUARD_CURRENT=""
          fi
          echo "ue4ss_current=${UE4SS_CURRENT:-未安装}" >> "$GITHUB_OUTPUT"
          echo "palguard_current=${PALGUARD_CURRENT:-未安装}" >> "$GITHUB_OUTPUT"
          echo "当前 UE4SS: ${UE4SS_CURRENT:-未安装}"
          echo "当前 PalGuard: ${PALGUARD_CURRENT:-未安装}"

      - name: Check if updates needed
        id: check
        run: |
          UE4SS_LATEST="${{ steps.ue4ss.outputs.latest_clean }}"
          UE4SS_CURRENT="${{ steps.current.outputs.ue4ss_current }}"

          if [ "$UE4SS_LATEST" != "$UE4SS_CURRENT" ]; then
            echo "needs_update=true" >> "$GITHUB_OUTPUT"
            echo "需要更新 UE4SS: $UE4SS_CURRENT -> $UE4SS_LATEST"
          else
            echo "needs_update=false" >> "$GITHUB_OUTPUT"
            echo "UE4SS 已是最新版本"
          fi

      - name: Update plugin-versions.json
        if: steps.check.outputs.needs_update == 'true'
        run: |
          UE4SS_LATEST="${{ steps.ue4ss.outputs.latest_clean }}"

          # 更新版本配置文件
          jq --arg ver "$UE4SS_LATEST" '.ue4ss.version = $ver' plugin-versions.json > tmp.json
          mv tmp.json plugin-versions.json

          echo "已更新 plugin-versions.json"
          cat plugin-versions.json

      - name: Create Pull Request
        if: steps.check.outputs.needs_update == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: 更新 UE4SS 版本到 ${{ steps.ue4ss.outputs.latest }}

            - UE4SS: ${{ steps.current.outputs.ue4ss_current }} -> ${{ steps.ue4ss.outputs.latest_clean }}
          branch: auto-update-plugins
          delete-branch: true
          title: 'chore: 更新 UE4SS 到 ${{ steps.ue4ss.outputs.latest }}'
          body: |
            ## 自动更新插件版本

            此 PR 由 GitHub Actions 自动创建，更新插件版本配置。

            ### 更新内容

            | 插件 | 当前版本 | 最新版本 | 状态 |
            |------|---------|---------|------|
            | UE4SS | ${{ steps.current.outputs.ue4ss_current }} | ${{ steps.ue4ss.outputs.latest_clean }} | 已更新 |
            | PalGuard | ${{ steps.current.outputs.palguard_current }} | ${{ steps.palguard.outputs.latest_clean }} | 待确认仓库 |

            ### 发布页面

            - [UE4SS ${{ steps.ue4ss.outputs.latest }}](https://github.com/UE4SS-RE/RE-UE4SS/releases/tag/${{ steps.ue4ss.outputs.latest }})

            ### 合并后操作

            合并此 PR 后，下次构建/打包时运行 `npm run update-plugins` 将自动下载对应版本。

            ---

            *由 [check-and-update-plugins.yml](.github/workflows/check-and-update-plugins.yml) 自动生成*
          labels: |
            plugin-update
            automated
            dependencies
          assignees: ${{ github.repository_owner }}

      - name: Update tracking issue
        if: steps.check.outputs.needs_update == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const issueTitle = '插件版本跟踪';
            const ue4ssLatest = '${{ steps.ue4ss.outputs.latest_clean }}';
            const ue4ssCurrent = '${{ steps.current.outputs.ue4ss_current }}';
            const palguardLatest = '${{ steps.palguard.outputs.latest_clean }}';
            const palguardCurrent = '${{ steps.current.outputs.palguard_current }}';

            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'plugin-tracking'
            });

            let trackingIssue = issues.data.find(issue => issue.title === issueTitle);

            const updateComment = `## ${new Date().toISOString().split('T')[0]} 更新检测

            | 插件 | 当前版本 | 最新版本 | 状态 |
            |------|---------|---------|------|
            | UE4SS | ${ue4ssCurrent} | ${ue4ssLatest} | ${ue4ssCurrent === ue4ssLatest ? '最新' : '已创建 PR'} |
            | PalGuard | ${palguardCurrent} | ${palguardLatest} | 待确认仓库 |

            ${ue4ssCurrent !== ue4ssLatest ? '已自动创建 PR 更新版本配置，请查看并合并。' : ''}`;

            if (!trackingIssue) {
              const issueBody = `# 插件版本自动跟踪

            此 issue 用于跟踪 UE4SS 和 PalGuard 插件的版本更新。

            ${updateComment}

            ## 说明

            - 此 issue 由 GitHub Actions 自动维护
            - 每天 UTC 00:00 自动检查更新
            - 检测到更新时会自动创建 PR
            - 合并 PR 后版本配置会自动更新

            ## 相关链接

            - [UE4SS 发布页](https://github.com/UE4SS-RE/RE-UE4SS/releases)
            - [插件版本文档](docs/PLUGIN_VERSIONS.md)`;

              trackingIssue = await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: issueTitle,
                body: issueBody,
                labels: ['plugin-tracking', 'automated']
              });

              console.log('已创建插件跟踪 issue');
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: trackingIssue.number,
                body: updateComment
              });

              console.log('已更新插件跟踪 issue');
            }
