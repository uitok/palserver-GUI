name: Check Plugin Updates

on:
  schedule:
    # 每天 UTC 00:00 (北京时间 08:00) 检查一次
    - cron: '0 0 * * *'
  workflow_dispatch: # 允许手动触发

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Check UE4SS latest version
        id: ue4ss
        run: |
          LATEST=$(curl -s https://api.github.com/repos/UE4SS-RE/RE-UE4SS/releases/latest | jq -r '.tag_name')
          echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "UE4SS 最新版本: $LATEST"

      - name: Check PalGuard latest version
        id: palguard
        continue-on-error: true
        run: |
          # 需要替换为实际的 PalGuard 仓库
          # LATEST=$(curl -s https://api.github.com/repos/OWNER/REPO/releases/latest | jq -r '.tag_name')
          # echo "latest=$LATEST" >> $GITHUB_OUTPUT
          echo "PalGuard 仓库地址待确认"

      - name: Read current versions
        id: current
        run: |
          if [ -f "assets/engine/server-template/UE4SS/ue4ss.version.txt" ]; then
            UE4SS_CURRENT=$(cat assets/engine/server-template/UE4SS/ue4ss.version.txt)
            echo "ue4ss_current=$UE4SS_CURRENT" >> $GITHUB_OUTPUT
          else
            echo "ue4ss_current=未安装" >> $GITHUB_OUTPUT
          fi

          if [ -f "assets/engine/server-template/Palguard/palguard.version.txt" ]; then
            PALGUARD_CURRENT=$(cat assets/engine/server-template/Palguard/palguard.version.txt)
            echo "palguard_current=$PALGUARD_CURRENT" >> $GITHUB_OUTPUT
          else
            echo "palguard_current=未安装" >> $GITHUB_OUTPUT
          fi

      - name: Create issue if updates available
        if: steps.ue4ss.outputs.latest != steps.current.outputs.ue4ss_current
        uses: actions/github-script@v7
        with:
          script: |
            const ue4ssLatest = '${{ steps.ue4ss.outputs.latest }}';
            const ue4ssCurrent = '${{ steps.current.outputs.ue4ss_current }}';

            const title = `🔄 插件更新可用: UE4SS ${ue4ssLatest}`;
            const body = `
            ## 插件更新通知

            检测到 UE4SS 有新版本可用：

            - **当前版本**: ${ue4ssCurrent}
            - **最新版本**: ${ue4ssLatest}
            - **发布页面**: https://github.com/UE4SS-RE/RE-UE4SS/releases/latest

            ### 更新方法

            运行以下命令自动更新：
            \`\`\`bash
            npm run update-plugins
            \`\`\`

            或手动下载并更新到 \`assets/engine/server-template/UE4SS/\` 目录。

            ### 注意事项

            - 请确认新版本与当前 Palworld 服务器版本兼容
            - 更新后建议进行完整测试
            - 查看 [PLUGIN_VERSIONS.md](docs/PLUGIN_VERSIONS.md) 了解更多信息
            `;

            // 检查是否已存在相同标题的 issue
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'plugin-update'
            });

            const existingIssue = issues.data.find(issue => issue.title === title);

            if (!existingIssue) {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['plugin-update', 'enhancement']
              });
              console.log('已创建更新提醒 issue');
            } else {
              console.log('更新提醒 issue 已存在，跳过创建');
            }
